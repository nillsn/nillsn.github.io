name: Remove Flight-Viewer App

on:
  workflow_dispatch:

jobs:
  delete-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Delete all files except .gitkeep
        run: |
          find ./flight-viewer -type f ! -name '.gitkeep' -delete

      - name: Show remaining files
        run: ls -la ./flight-viewer/

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m ":zap: cleanup flight-viewer folder" || echo "No changes to commit"

      - name: Push changes
        run: git push
